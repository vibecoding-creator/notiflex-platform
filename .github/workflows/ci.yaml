name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/ci.yaml'

env:
  REGISTRY: asia-northeast3-docker.pkg.dev
  PROJECT_ID: ssw-gitaiops-project
  REPOSITORY: notiflex
  IMAGE: api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          IMAGE_URL="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${IMAGE_TAG}"
          docker build -t "$IMAGE_URL" app/
          docker push "$IMAGE_URL"
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Update deployment image tag
        run: |
          sed -i "s|image:.*api:.*|image: ${{ env.IMAGE_URL }}|g" k8s/smb/deployment.yaml

      - name: Commit and push deployment update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add k8s/smb/deployment.yaml
          git commit -m "chore: Update API image to ${{ env.IMAGE_TAG }}" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
