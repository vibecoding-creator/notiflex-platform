deploymentMode: SingleBinary<->SimpleScalable

loki:
  auth_enabled: false
  useTestSchema: true

  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

  limits_config:
    retention_period: 720h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      cpu: 100m
      memory: 512Mi

persistence:
  enabled: true
  size: 5Gi

# Cache 비활성화 (Pending 상태 해결)
memcachedChunks:
  enabled: false

memcachedResults:
  enabled: false

grafana:
  datasource:
    isDefault: false
